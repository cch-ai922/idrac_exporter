# Read-only BMC credentials for the exporter (Redfish).
# The exporter only needs READ access. Create a dedicated read-only user on each
# iDRAC / XCC / Supermicro BMC and put it here.
#
# Keys under `hosts:` are the BMC IP/hostname AND become the Prometheus
# `instance` label via the Probe — keep them identical to the targets in
# 12-idrac-exporter-probe.yaml and the host keys in 40-guardian-secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: idrac-exporter-config
  namespace: bmc-guardian
stringData:
  idrac.yml: |
    address: 0.0.0.0
    port: 9348
    timeout: 15
    hosts:
      # ---- Dell PowerEdge XE9680 (iDRAC9) ----
      192.168.10.11:
        username: monitor
        password: "CHANGE_ME_DELL"
      # ---- Lenovo (XClarity Controller / XCC) ----
      192.168.10.12:
        username: monitor
        password: "CHANGE_ME_LENOVO"
      # ---- Supermicro (SSG-6049P-E1CR60H, 10.20.0.20) is NOT listed here ----
      # Its X11 BMC gates the Redfish DATA API behind a paid license
      # (SFT-OOB-LIC); /redfish/v1 returns "Base.1.0.0.OemLicenseNotPassed", so
      # idrac_exporter fails with "failed to instantiate new client" (HTTP 500).
      # It is monitored over IPMI instead — see 13/14/15-ipmi-exporter-*.yaml.
      # fallback if a target has no explicit entry
      default:
        username: monitor
        password: "CHANGE_ME_DEFAULT"
    # NOTE: `metrics` is GLOBAL — idrac_exporter has no per-host metric selection.
    # Keep this to groups every box (incl. the old Supermicro) can serve, or one
    # unsupported collector can blank out a whole scrape. Widen only after the
    # Supermicro target reports up=1 with these enabled.
    metrics:
      system: true     # health, power_on, machine_info
      sensors: true    # temperature, fan health/speed, voltage
      power: true      # PSU health + consumption
      # storage: true  # re-enable once verified on the Supermicro
      # memory: true   # re-enable once verified on the Supermicro
