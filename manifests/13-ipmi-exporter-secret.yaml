# IPMI credentials + module config for the Supermicro host.
#
# WHY THIS EXISTS: the Supermicro BMC (SSG-6049P-E1CR60H, X11) gates its Redfish
# DATA API behind a paid license (SFT-OOB-LIC); hitting /redfish/v1 returns
# "Base.1.0.0.OemLicenseNotPassed", so idrac_exporter fails with
# "failed to instantiate new client" (HTTP 500). IPMI sensor reads are NOT
# license-gated, so we monitor this host over IPMI instead of Redfish.
#
# This user/pass is the BMC's IPMI account (same BMC, IPMI-over-LAN). Read-only
# is enough for sensors — "user" privilege suffices.
apiVersion: v1
kind: Secret
metadata:
  name: ipmi-exporter-config
  namespace: bmc-guardian
stringData:
  ipmi.yml: |
    modules:
      supermicro:
        user: "monitor"
        pass: "CHANGE_ME_SMC_IPMI"
        driver: "LAN_2_0"        # IPMI 2.0 (lanplus). Old BMCs sometimes need "LAN".
        privilege: "user"        # read-only sensor access
        timeout: 10000
        collectors:
          - ipmi                 # ipmi_sensor_* : temperature / fan / voltage / state
          - chassis              # ipmi_chassis_power_state
          - dcmi                 # ipmi_dcmi_power_consumption_watts (PSU draw)
        # If a specific sensor id is noisy/unsupported on this board, list it here:
        # exclude_sensor_ids: [ 2, 29 ]
